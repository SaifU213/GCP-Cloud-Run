steps:
  # Step 1: Get backend URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'get-backend-url'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe saif-bank-backend \
          --region=${_REGION} \
          --format='value(status.url)' > backend_url.txt

        cat backend_url.txt

  # Step 2: Build frontend image (with docker builder!)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat backend_url.txt)

        docker build \
          --build-arg REACT_APP_API_URL=$$BACKEND_URL \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/saif-bank-frontend:${SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/saif-bank-frontend:latest \
          ./bank-frontend

    waitFor:
      - get-backend-url

  # Step 3: Push image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/saif-bank-frontend'
    waitFor:
      - build-frontend-image

  # Step 4: Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'saif-bank-frontend'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/saif-bank-frontend:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--service-account=${_SERVICE_ACCOUNT}'
    waitFor:
      - push-frontend-image

substitutions:
  _REGION: northamerica-northeast2
  _ARTIFACT_REPO: saif-bank-repo
  _SERVICE_ACCOUNT: 79505229087-compute@developer.gserviceaccount.com

