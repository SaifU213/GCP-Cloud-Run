steps:
  # Set backend URL (hardcoded)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'get-backend-url'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
          BACKEND_URL="https://saif-bank-backend-79505229087.northamerica-northeast2.run.app"

          echo $$BACKEND_URL > backend_url.txt
          cat backend_url.txt

  # Build frontend with backend URL
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
          BACKEND_URL=$(cat backend_url.txt)

          docker build \
            --build-arg REACT_APP_API_URL=$$BACKEND_URL \
            -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/saif-bank-frontend:${SHORT_SHA} \
            -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/saif-bank-frontend:latest \
            ./bank-frontend
    waitFor:
      - get-backend-url

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/saif-bank-frontend'
    waitFor:
      - build-frontend

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'saif-bank-frontend'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/saif-bank-frontend:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--service-account=${_SERVICE_ACCOUNT}'
    waitFor:
      - push-frontend

substitutions:
  _REGION: northamerica-northeast2
  _ARTIFACT_REPO: saif-bank-repo
  _SERVICE_ACCOUNT: 79505229087-compute@developer.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY